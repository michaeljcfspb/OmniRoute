name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - ".github/workflows/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag to build (e.g. 2.6.0)"
        required: false
        type: string

concurrency:
  group: docker-publish-jxnlexn-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jxnlexn/omniroute

jobs:
  docker:
    if: github.repository == 'JxnLexn/OmniRoute'
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && (startsWith(inputs.version, 'v') && format('refs/tags/{0}', inputs.version) || format('refs/tags/v{0}', inputs.version)) || '' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          {
            echo "tags<<EOF"
            if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
              VERSION="${RELEASE_TAG#v}"
              echo "${IMAGE_NAME}:${VERSION}"
              echo "${IMAGE_NAME}:latest"
            elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              VERSION="${GITHUB_REF_NAME#v}"
              echo "${IMAGE_NAME}:${VERSION}"
              echo "${IMAGE_NAME}:latest"
            elif [ -n "${DISPATCH_VERSION}" ]; then
              VERSION="${DISPATCH_VERSION#v}"
              echo "${IMAGE_NAME}:${VERSION}"
              echo "${IMAGE_NAME}:latest"
            else
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:main"
              echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          target: runner-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
