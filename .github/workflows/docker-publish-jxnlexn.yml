name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - ".github/workflows/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag to build (e.g. 2.6.0)"
        required: false
        type: string

concurrency:
  group: docker-publish-jxnlexn-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jxnlexn/omniroute

jobs:
  metadata:
    if: github.repository == 'JxnLexn/OmniRoute'
    name: Prepare Docker tags
    runs-on: ubuntu-latest
    outputs:
      amd64_tags: ${{ steps.docker-tags.outputs.amd64_tags }}
      arm64_tags: ${{ steps.docker-tags.outputs.arm64_tags }}
      manifest_tags: ${{ steps.docker-tags.outputs.manifest_tags }}
      checkout_ref: ${{ steps.checkout-ref.outputs.ref }}

    steps:
      - name: Prepare checkout ref
        id: checkout-ref
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${DISPATCH_VERSION}" ]; then
            VERSION="${DISPATCH_VERSION}"
            if [ "${VERSION#v}" = "${VERSION}" ]; then
              VERSION="v${VERSION}"
            fi
            echo "ref=refs/tags/${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Docker tags
        id: docker-tags
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${RELEASE_TAG#v}"
            MANIFEST_TAGS="${IMAGE_NAME}:${VERSION}\n${IMAGE_NAME}:latest"
            AMD64_TAGS="${IMAGE_NAME}:${VERSION}-amd64\n${IMAGE_NAME}:latest-amd64"
            ARM64_TAGS="${IMAGE_NAME}:${VERSION}-arm64\n${IMAGE_NAME}:latest-arm64"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            MANIFEST_TAGS="${IMAGE_NAME}:${VERSION}\n${IMAGE_NAME}:latest"
            AMD64_TAGS="${IMAGE_NAME}:${VERSION}-amd64\n${IMAGE_NAME}:latest-amd64"
            ARM64_TAGS="${IMAGE_NAME}:${VERSION}-arm64\n${IMAGE_NAME}:latest-arm64"
          elif [ -n "${DISPATCH_VERSION}" ]; then
            VERSION="${DISPATCH_VERSION#v}"
            MANIFEST_TAGS="${IMAGE_NAME}:${VERSION}\n${IMAGE_NAME}:latest"
            AMD64_TAGS="${IMAGE_NAME}:${VERSION}-amd64\n${IMAGE_NAME}:latest-amd64"
            ARM64_TAGS="${IMAGE_NAME}:${VERSION}-arm64\n${IMAGE_NAME}:latest-arm64"
          else
            MANIFEST_TAGS="${IMAGE_NAME}:latest\n${IMAGE_NAME}:main\n${IMAGE_NAME}:sha-${GITHUB_SHA}"
            AMD64_TAGS="${IMAGE_NAME}:latest-amd64\n${IMAGE_NAME}:main-amd64\n${IMAGE_NAME}:sha-${GITHUB_SHA}-amd64"
            ARM64_TAGS="${IMAGE_NAME}:latest-arm64\n${IMAGE_NAME}:main-arm64\n${IMAGE_NAME}:sha-${GITHUB_SHA}-arm64"
          fi

          {
            echo "manifest_tags<<EOF"
            printf '%b\n' "$MANIFEST_TAGS"
            echo "EOF"
            echo "amd64_tags<<EOF"
            printf '%b\n' "$AMD64_TAGS"
            echo "EOF"
            echo "arm64_tags<<EOF"
            printf '%b\n' "$ARM64_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build and Push Docker Image (amd64)
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: true
          tags: ${{ needs.metadata.outputs.amd64_tags }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    name: Build and Push Docker Image (arm64)
    runs-on: ubuntu-24.04-arm
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          target: runner-base
          platforms: linux/arm64
          push: true
          tags: ${{ needs.metadata.outputs.arm64_tags }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  manifest:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-amd64
      - build-arm64

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifests
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<'EOF'
          ${{ needs.metadata.outputs.manifest_tags }}
          EOF
